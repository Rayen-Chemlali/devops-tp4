apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-tp-app
  namespace: devops-tp
  labels:
    app: devops-tp
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-tp
  template:
    metadata:
      labels:
        app: devops-tp
    spec:
      containers:
      - name: devops-tp-app
        # IMAGE_PLACEHOLDER est remplacé par Ansible lors du déploiement
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
