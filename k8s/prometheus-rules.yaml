apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-tp-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: devops-tp.rules
    rules:

    # Alerte si le service est Down depuis 2 minutes
    - alert: AppServiceDown
      expr: up{namespace="devops-tp"} == 0
      for: 2m
      labels:
        severity: critical
        team: devops
      annotations:
        summary: "🔴 Service devops-tp DOWN"
        description: "Le service {{ $labels.job }} est inaccessible depuis plus de 2 minutes."

    # Alerte si un pod redémarre trop souvent
    - alert: PodRestartingTooMuch
      expr: rate(kube_pod_container_status_restarts_total{namespace="devops-tp"}[15m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "⚠️ Pod {{ $labels.pod }} redémarre trop souvent"
        description: "Plus de 1 restart toutes les 10 minutes."

    # Alerte si CPU élevé
    - alert: HighCPUUsage
      expr: >
        sum(rate(container_cpu_usage_seconds_total{namespace="devops-tp"}[5m]))
        by (pod) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "⚠️ CPU élevé sur {{ $labels.pod }}"
        description: "Utilisation CPU > 80% depuis 5 minutes."
